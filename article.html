<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 · 银杏新评</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    * { -webkit-tap-highlight-color: transparent; }
    ::selection { background: var(--accent-soft); color: inherit; }
    ::-moz-selection { background: var(--accent-soft); color: inherit; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
    input { font-family: inherit; }
    *:focus { outline: none; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    :root[data-theme="light"] {
      --bg: #fffaf0; --bg-soft: #fff4d6; --bg-card: rgba(255, 255, 255, 0.78); --text: #2d2515; --muted: #776a45; --muted-2: rgba(118, 103, 70, 0.65); --accent: #9a6d00; --accent-bright: #d8a51f; --accent-soft: rgba(217, 165, 32, 0.25); --line: rgba(110, 80, 20, 0.18); --line-strong: rgba(110, 80, 20, 0.35); --shadow: 0 16px 40px rgba(109, 77, 8, 0.08); --shadow-hover: 0 24px 60px rgba(109, 77, 8, 0.16); --glow: 0 0 0 rgba(217, 165, 32, 0); --blob-1: rgba(255, 217, 93, 0.30); --blob-2: rgba(112, 145, 64, 0.18); --leaf-color: linear-gradient(135deg, #f0c33a, #a97600);
    }
    :root[data-theme="gray"] {
      --bg: #f2f2f4; --bg-soft: #e8e8eb; --bg-card: rgba(255, 255, 255, 0.85); --text: #1d1d1f; --muted: #6e6e73; --muted-2: rgba(110, 110, 115, 0.7); --accent: #a67c00; --accent-bright: #d4a300; --accent-soft: rgba(166, 124, 0, 0.18); --line: rgba(0, 0, 0, 0.1); --line-strong: rgba(0, 0, 0, 0.2); --shadow: 0 16px 40px rgba(0, 0, 0, 0.05); --shadow-hover: 0 24px 60px rgba(0, 0, 0, 0.1); --glow: 0 0 25px rgba(166, 124, 0, 0.15); --blob-1: rgba(255, 248, 225, 0.6); --blob-2: rgba(220, 220, 225, 0.4); --leaf-color: linear-gradient(135deg, #f0c33a, #a97600);
    }
    :root[data-theme="black"] {
      --bg: #0a0a0a; --bg-soft: #121212; --bg-card: rgba(20, 20, 20, 0.88); --text: #f5f3ed; --muted: #a39f93; --muted-2: rgba(163, 159, 147, 0.6); --accent: #ffd54a; --accent-bright: #ffeb8a; --accent-soft: rgba(255, 213, 74, 0.25); --line: rgba(255, 213, 74, 0.25); --line-strong: rgba(255, 213, 74, 0.6); --shadow: 0 16px 40px rgba(0, 0, 0, 0.5); --shadow-hover: 0 24px 60px rgba(0, 0, 0, 0.7); --glow: 0 0 35px rgba(255, 213, 74, 0.35); --blob-1: rgba(255, 213, 74, 0.06); --blob-2: rgba(255, 213, 74, 0.04); --leaf-color: linear-gradient(135deg, #ffd54a, #b88806);
    }
    :root[data-theme="blue"] {
      --bg: #eef3fb; --bg-soft: #e2ebf6; --bg-card: rgba(255, 255, 255, 0.85); --text: #1a2a44; --muted: #56688a; --muted-2: rgba(86, 104, 138, 0.65); --accent: #2c5fa8; --accent-bright: #4a83d4; --accent-soft: rgba(74, 131, 212, 0.25); --line: rgba(44, 95, 168, 0.2); --line-strong: rgba(44, 95, 168, 0.4); --shadow: 0 16px 40px rgba(28, 64, 122, 0.1); --shadow-hover: 0 24px 60px rgba(28, 64, 122, 0.15); --glow: 0 0 25px rgba(44, 95, 168, 0.15); --blob-1: rgba(74, 131, 212, 0.15); --blob-2: rgba(140, 180, 230, 0.15); --leaf-color: linear-gradient(135deg, #6ea7e8, #2c5fa8);
    }

    body {
      font-family: 'Noto Serif SC', "Songti SC", "SimSun", serif;
      color: var(--text); background: var(--bg); min-height: 100vh; overflow-x: hidden;
      transition: color 0.4s ease, background 0.4s ease;
    }
    .art-font { font-family: 'Zhi Mang Xing', cursive; font-weight: normal; }

    .page { width: min(960px, calc(100% - 40px)); margin: 0 auto; position: relative; z-index: 2; }

    .card, .panel, .article-card, .nav-btn, .chip, .back-btn, .theme-btn {
      transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, box-shadow;
    }

    .card:hover, .panel:hover, .article-card:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: var(--shadow-hover), var(--glow);
      border-color: var(--line-strong);
    }

    .flow-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.6; will-change: transform; animation: blobFloat 25s ease-in-out infinite alternate; }
    .blob.b1 { width: 500px; height: 500px; top: -10%; left: -10%; background: var(--blob-1); }
    .blob.b2 { width: 400px; height: 400px; bottom: -10%; right: -10%; background: var(--blob-2); animation-delay: -5s; }
    @keyframes blobFloat { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 30px); } }

    /* 固定顶栏，与首页完全一致 */
    .topbar-wrap { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
    .topbar {
      width: 100%; height: 64px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 max(4vw, 20px); background: color-mix(in srgb, var(--bg-card) 85%, transparent);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      transition: background 0.4s ease, border-color 0.4s ease;
    }
    [data-theme="gray"] .topbar, [data-theme="black"] .topbar { border-color: var(--line-strong); box-shadow: 0 4px 20px rgba(0,0,0,0.2), var(--glow); }

    .brand { font-size: 24px; letter-spacing: 0.05em; color: var(--accent); }
    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      min-height: 38px; padding: 0 16px; border-radius: 999px; border: 1px solid var(--line);
      background: var(--bg-card); color: var(--text); display: inline-flex; align-items: center;
      font-size: 15px; font-weight: 600;
    }
    .back-btn:hover { box-shadow: var(--glow); border-color: var(--line-strong); transform: translateX(-2px); }

    .theme-switcher { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 999px; border: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 60%, transparent); }
    .theme-btn { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform .3s, border-color .3s; }
    .theme-btn[data-theme="light"] { background: #fffaf0; } .theme-btn[data-theme="gray"] { background: #e8e8eb; } .theme-btn[data-theme="black"] { background: #1a1a1a; } .theme-btn[data-theme="blue"] { background: #4a83d4; }
    .theme-btn:hover { transform: scale(1.2); } .theme-btn.active { transform: scale(1.2); border-color: var(--accent); box-shadow: 0 0 8px var(--accent); }

    main { padding: 100px 0 80px; }

    .card, .panel { padding: 32px; border-radius: 24px; border: 1px solid var(--line); background: var(--bg-card); box-shadow: var(--shadow); backdrop-filter: blur(16px); }
    [data-theme="gray"] .card, [data-theme="black"] .card, [data-theme="gray"] .panel, [data-theme="black"] .panel { border-color: var(--line-strong); box-shadow: var(--shadow), var(--glow); }

    .panel-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .panel-head h1 { font-size: clamp(32px, 5vw, 48px); line-height: 1.1; font-weight: 900; }
    .panel-head p { margin-top: 8px; color: var(--muted); font-size: 15px; }

    .search-box { position: relative; margin: 18px 0 22px; }
    .search-box input { width: 100%; padding: 16px 18px 16px 50px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-card); color: var(--text); font-size: 15px; transition: box-shadow 0.3s, border-color 0.3s; }
    .search-box input:focus { border-color: var(--line-strong); box-shadow: var(--glow); }
    .search-box svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--muted); pointer-events: none; }

    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
    .chip { padding: 8px 18px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-card); color: var(--muted); font-size: 15px; font-weight: 600; }
    .chip:hover, .chip.active { color: var(--accent); border-color: var(--line-strong); box-shadow: var(--glow); transform: translateY(-2px); }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .article-card { padding: 24px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg-card); box-shadow: var(--shadow); display: flex; flex-direction: column; cursor: pointer; min-height: 220px; }
    .article-card:active { transform: scale(1.03); }
    [data-theme="gray"] .article-card, [data-theme="black"] .article-card { border-color: var(--line); }

    .tag { display: inline-flex; width: fit-content; padding: 4px 12px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .article-card h3 { font-size: 19px; line-height: 1.5; margin-bottom: 10px; font-weight: 900; }
    .meta { color: var(--muted-2); font-size: 13px; margin-bottom: 12px; }
    .excerpt { color: var(--muted); font-size: 15px; line-height: 1.8; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    .empty { display: none; padding: 28px; border: 1px dashed var(--line-strong); border-radius: 16px; text-align: center; color: var(--muted); background: var(--bg-card); margin-top: 16px; }
    .empty.show { display: block; }

    /* 文章详情 */
    .article-tag { display: inline-flex; padding: 5px 14px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); font-size: 14px; font-weight: 600; margin-bottom: 18px; }
    .article-page h1 { font-size: clamp(30px, 5vw, 46px); line-height: 1.25; margin-bottom: 16px; font-weight: 900; }
    .article-meta { color: var(--muted); font-size: 14px; padding-bottom: 22px; margin-bottom: 28px; border-bottom: 1px solid var(--line); }
    .article-content { color: var(--text); font-size: 16.5px; line-height: 2; }
    .article-content p { margin-bottom: 20px; }

    .article-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--line); }
    .nav-btn { padding: 16px 20px; border-radius: 16px; border: 1px solid var(--line); background: var(--bg-card); display: flex; flex-direction: column; gap: 6px; }
    .nav-btn:hover { box-shadow: var(--glow); border-color: var(--line-strong); transform: translateY(-2px); }
    .nav-btn.disabled { opacity: 0.4; pointer-events: none; }
    .nav-btn.next { text-align: right; align-items: flex-end; }
    .nav-label { color: var(--muted); font-size: 12px; }
    .nav-title { color: var(--accent); font-weight: 800; font-size: 15px; }

    footer { padding: 30px 0 50px; color: var(--muted); font-size: 14px; text-align: center; border-top: 1px solid var(--line); position: relative; z-index: 2; }
    .back-top { position: fixed; right: 22px; bottom: 22px; z-index: 70; width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line); background: var(--bg-card); color: var(--text); display: grid; place-items: center; opacity: 0; pointer-events: none; transform: translateY(16px); backdrop-filter: blur(12px); transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s; cursor: pointer; font-size: 18px; font-weight: 800; }
    .back-top.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .back-top:hover { box-shadow: var(--glow); border-color: var(--line-strong); transform: scale(1.08); }

    @media (max-width: 980px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { .topbar { padding: 10px 16px; } .brand { font-size: 20px; } .grid { grid-template-columns: 1fr; } .card, .panel { padding: 24px; } .article-nav { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="flow-bg" aria-hidden="true"><div class="blob b1"></div><div class="blob b2"></div></div>

  <div class="topbar-wrap">
    <div class="topbar">
      <a href="index.html" class="brand art-font">银杏新评</a>
      <div class="nav-actions">
        <a href="index.html" class="back-btn">← 返回主页</a>
        <div class="theme-switcher" id="themeSwitcher">
          <button class="theme-btn" data-theme="light" aria-label="白"></button>
          <button class="theme-btn" data-theme="gray" aria-label="灰"></button>
          <button class="theme-btn" data-theme="black" aria-label="黑"></button>
          <button class="theme-btn" data-theme="blue" aria-label="蓝"></button>
        </div>
      </div>
    </div>
  </div>

  <main class="page">
    <div id="content"></div>
  </main>

  <footer>© <span id="year"></span> 银杏新评 · 非营利学生投稿文学评论集</footer>
  <button class="back-top" id="backTop" aria-label="返回顶部">↑</button>

  <script>
    const $ = id => document.getElementById(id);
    const escapeHtml = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    const formatContent = text => String(text ?? "").split(/\n\s*\n/).map(p => `<p>${escapeHtml(p).replace(/\n/g,"<br>")}</p>`).join("");

    function setTheme(t) { document.documentElement.dataset.theme = t; localStorage.setItem("yx-theme", t); document.querySelectorAll(".theme-btn").forEach(b => b.classList.toggle("active", b.dataset.theme === t)); }
    setTheme(localStorage.getItem("yx-theme") || "light");
    $("themeSwitcher").onclick = e => { const b = e.target.closest(".theme-btn"); if(b) setTheme(b.dataset.theme); };
    $("year").textContent = new Date().getFullYear();

    let allArticles = [];
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const cat = params.get("cat");

    async function loadArticles() {
      try { const r = await fetch("articles.json?_=" + Date.now()); allArticles = await r.json(); allArticles.sort((a,b) => new Date(b.date) - new Date(a.date)); } catch(e) { allArticles = []; }
      if (id) renderArticle(id);
      else renderLibrary();
    }

    function makeCard(article) {
      const c = document.createElement("article"); c.className = "article-card";
      c.onclick = () => location.href = "article.html?id=" + encodeURIComponent(article.id);
      c.innerHTML = `<span class="tag">${escapeHtml(article.category)}</span><h3>${escapeHtml(article.title)}</h3><div class="meta">${escapeHtml(article.author)} · ${escapeHtml(article.date)}</div><div class="excerpt">${escapeHtml(article.excerpt || "")}</div>`;
      return c;
    }

    function renderLibrary() {
      const title = cat || "全部文章";
      const list = cat ? allArticles.filter(a => a.category === cat) : allArticles;
      $("content").innerHTML = `
        <section class="panel">
          <div class="panel-head"><div><h1>${escapeHtml(title)}</h1><p>文章库 · 搜索与筛选</p></div></div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input id="libSearch" type="search" placeholder="搜索..." />
          </div>
          <div class="chips">
            <a class="chip ${!cat?'active':''}" href="article.html">全部</a>
            <a class="chip ${cat==='时事评论'?'active':''}" href="article.html?cat=时事评论">时事评论</a>
            <a class="chip ${cat==='学术交流'?'active':''}" href="article.html?cat=学术交流">学术交流</a>
            <a class="chip ${cat==='随笔记录'?'active':''}" href="article.html?cat=随笔记录">随笔记录</a>
            <a class="chip ${cat==='文学创作'?'active':''}" href="article.html?cat=文学创作">文学创作</a>
          </div>
          <div class="grid" id="articleGrid"></div>
          <div class="empty" id="libEmpty">没有找到匹配文章</div>
        </section>`;

      const input = $("libSearch"), grid = $("articleGrid"), empty = $("libEmpty");
      function draw() {
        const kw = input.value.trim().toLowerCase();
        grid.innerHTML = "";
        const res = list.filter(a => `${a.title} ${a.author} ${a.excerpt} ${a.content}`.toLowerCase().includes(kw));
        if(!res.length) { empty.classList.add("show"); return; }
        empty.classList.remove("show");
        res.forEach(a => grid.appendChild(makeCard(a)));
      }
      input.oninput = draw;
      draw();
    }

    function renderArticle(articleId) {
      const idx = allArticles.findIndex(a => a.id === articleId);
      if (idx === -1) {
        $("content").innerHTML = `<div class="panel" style="text-align:center"><h1 style="margin-bottom:12px;font-weight:900;">未找到这篇文章</h1><p style="color:var(--muted);margin-bottom:16px;">可能文章已删除或链接有误</p><a href="article.html" style="color:var(--accent);font-weight:800;">返回全部文章</a></div>`;
        return;
      }
      const a = allArticles[idx], prev = idx > 0 ? allArticles[idx-1] : null, next = idx < allArticles.length-1 ? allArticles[idx+1] : null;
      document.title = a.title + " · 银杏新评";
      $("content").innerHTML = `
        <article class="card article-page">
          <span class="article-tag">${escapeHtml(a.category)}</span>
          <h1>${escapeHtml(a.title)}</h1>
          <div class="article-meta">${escapeHtml(a.author)} · ${escapeHtml(a.date)}</div>
          <div class="article-content">${formatContent(a.content)}</div>
          <div class="article-nav">
            <a class="nav-btn ${prev?'':'disabled'}" href="${prev ? 'article.html?id='+encodeURIComponent(prev.id) : '#'}">
              <span class="nav-label">← 上一篇</span>
              <span class="nav-title">${prev ? escapeHtml(prev.title) : '已是第一篇'}</span>
            </a>
            <a class="nav-btn next ${next?'':'disabled'}" href="${next ? 'article.html?id='+encodeURIComponent(next.id) : '#'}">
              <span class="nav-label">下一篇 →</span>
              <span class="nav-title">${next ? escapeHtml(next.title) : '已是最后一篇'}</span>
            </a>
          </div>
        </article>`;
    }

    const backTop = $("backTop");
    window.addEventListener("scroll", () => backTop.classList.toggle("show", scrollY > 420), {passive:true});
    backTop.onclick = () => scrollTo({top:0, behavior:"smooth"});

    loadArticles();
  </script>
</body>
</html>
