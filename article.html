<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 · 银杏新评</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    * { -webkit-tap-highlight-color: transparent; }
    ::selection { background: var(--accent-soft); color: inherit; }
    a { color: inherit; text-decoration: none; }
    button, input { font-family: inherit; }
    button { border: 0; background: none; color: inherit; cursor: pointer; }
    *:focus { outline: none; }

    :root[data-theme="light"] { --bg: #fffaf0; --bg-card: rgba(255, 255, 255, 0.78); --text: #2d2515; --muted: #776a45; --muted-2: rgba(118, 103, 70, 0.65); --accent: #9a6d00; --accent-bright: #d8a51f; --accent-soft: rgba(217, 165, 32, 0.32); --line: rgba(110, 80, 20, 0.18); --line-strong: rgba(110, 80, 20, 0.30); --shadow: 0 24px 70px rgba(109, 77, 8, 0.16); --shadow-card: 0 18px 46px rgba(109, 77, 8, 0.10); --glow: 0 0 0 rgba(217, 165, 32, 0); --blob-1: rgba(255, 217, 93, 0.30); --blob-2: rgba(112, 145, 64, 0.18); --leaf-color: linear-gradient(135deg, #f0c33a, #a97600); }
    :root[data-theme="gray"] { --bg: #f5f5f7; --bg-card: rgba(255, 255, 255, 0.82); --text: #1d1d1f; --muted: #6e6e73; --muted-2: rgba(110, 110, 115, 0.7); --accent: #a67c00; --accent-bright: #d4a300; --accent-soft: rgba(166, 124, 0, 0.18); --line: rgba(0, 0, 0, 0.09); --line-strong: rgba(0, 0, 0, 0.15); --shadow: 0 20px 60px rgba(0, 0, 0, 0.06); --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.04); --glow: 0 0 25px rgba(166, 124, 0, 0.12); --blob-1: rgba(255, 248, 225, 0.6); --blob-2: rgba(220, 220, 225, 0.3); --leaf-color: linear-gradient(135deg, #f0c33a, #a97600); }
    :root[data-theme="black"] { --bg: #080808; --bg-card: rgba(16, 16, 16, 0.92); --text: #f5f3ed; --muted: #b8b3a3; --muted-2: rgba(184, 179, 163, 0.6); --accent: #ffd54a; --accent-bright: #ffeb8a; --accent-soft: rgba(255, 213, 74, 0.30); --line: rgba(255, 213, 74, 0.38); --line-strong: rgba(255, 213, 74, 0.65); --shadow: 0 24px 70px rgba(0, 0, 0, 0.7); --shadow-card: 0 18px 46px rgba(0, 0, 0, 0.6); --glow: 0 0 30px rgba(255, 213, 74, 0.35); --blob-1: rgba(255, 213, 74, 0.06); --blob-2: rgba(255, 213, 74, 0.04); --leaf-color: linear-gradient(135deg, #ffd54a, #b88806); }
    :root[data-theme="blue"] { --bg: #eef3fb; --bg-card: rgba(255, 255, 255, 0.82); --text: #1a2a44; --muted: #56688a; --muted-2: rgba(86, 104, 138, 0.65); --accent: #2c5fa8; --accent-bright: #4a83d4; --accent-soft: rgba(74, 131, 212, 0.28); --line: rgba(44, 95, 168, 0.22); --line-strong: rgba(44, 95, 168, 0.42); --shadow: 0 24px 70px rgba(28, 64, 122, 0.14); --shadow-card: 0 18px 46px rgba(28, 64, 122, 0.10); --glow: 0 0 0 rgba(74, 131, 212, 0); --blob-1: rgba(74, 131, 212, 0.22); --blob-2: rgba(140, 180, 230, 0.18); --leaf-color: linear-gradient(135deg, #6ea7e8, #2c5fa8); }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; overflow-x: hidden; transition: color 0.3s ease, background 0.3s ease; }
    .page { width: min(960px, calc(100% - 36px)); margin: 0 auto; position: relative; z-index: 2; }
    .flow-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .blob { position: absolute; border-radius: 50%; filter: blur(50px); opacity: 0.6; will-change: transform; animation: blobFloat 25s cubic-bezier(.25,.1,.25,1) infinite; }
    .blob.b1 { width: 340px; height: 340px; top: -90px; left: -80px; background: var(--blob-1); }
    .blob.b2 { width: 300px; height: 300px; bottom: 5%; right: -60px; background: var(--blob-2); animation-duration: 28s; }
    @keyframes blobFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(25px, -20px) scale(1.04); } }

    .topbar-wrap { position: fixed; top: 18px; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; padding: 0 18px; pointer-events: none; }
    .topbar { pointer-events: auto; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 14px 10px 22px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-card); backdrop-filter: blur(18px) saturate(160%); -webkit-backdrop-filter: blur(18px) saturate(160%); box-shadow: var(--shadow-card); max-width: 820px; width: 100%; }
    [data-theme="gray"] .topbar, [data-theme="black"] .topbar { border-color: var(--line-strong); box-shadow: var(--shadow-card), var(--glow); }
    .brand { font-weight: 800; font-size: 16px; letter-spacing: 0.1em; white-space: nowrap; }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .back-btn { min-height: 38px; padding: 0 14px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-card); color: var(--text); display: inline-flex; align-items: center; font-size: 14px; transition: transform 0.2s, box-shadow 0.2s; }
    .back-btn:hover { box-shadow: var(--glow); transform: translateX(-2px); }
    .back-btn:active { transform: scale(1.05); transition-duration: 0.1s; }
    .theme-switcher { display: flex; gap: 6px; padding: 4px 7px; border-radius: 999px; border: 1px solid var(--line); background: color-mix(in srgb, var(--bg) 50%, transparent); }
    .theme-btn { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .theme-btn:hover { transform: scale(1.12); } .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .theme-btn[data-theme="light"] { background: #fffaf0; } .theme-btn[data-theme="gray"] { background: #f5f5f7; } .theme-btn[data-theme="black"] { background: #0a0a0a; } .theme-btn[data-theme="blue"] { background: linear-gradient(135deg, #6ea7e8, #2c5fa8); }

    main { padding: 108px 0 72px; }
    .card, .panel { padding: 30px; border-radius: 26px; border: 1px solid var(--line); background: var(--bg-card); box-shadow: var(--shadow-card); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); animation: pageIn .55s cubic-bezier(.2,.8,.2,1) both; }
    [data-theme="gray"] .card, [data-theme="black"] .card, [data-theme="gray"] .panel, [data-theme="black"] .panel { border-color: var(--line-strong); box-shadow: var(--shadow-card), var(--glow); }
    @keyframes pageIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

    .panel-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
    .panel-head h1 { font-size: clamp(32px, 5vw, 52px); line-height: 1.1; letter-spacing: -0.05em; }
    .panel-head p { margin-top: 8px; color: var(--muted); font-size: 15px; }
    .search-box { position: relative; margin: 18px 0 22px; }
    .search-box input { width: 100%; height: 52px; padding: 0 18px 0 48px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-card); color: var(--text); font-size: 15px; }
    .search-box input:focus { border-color: var(--line-strong); box-shadow: var(--glow); }
    .search-box svg { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--muted); pointer-events: none; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
    .chip { padding: 10px 16px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-card); color: var(--muted); font-size: 14px; transition: transform 0.2s, box-shadow 0.2s, color 0.2s, border-color 0.2s; }
    .chip:hover, .chip.active { color: var(--accent); border-color: var(--line-strong); box-shadow: var(--glow); }
    .chip:active { transform: scale(1.05); transition-duration: 0.1s; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .article-card { min-height: 210px; padding: 22px; border-radius: 24px; border: 1px solid var(--line); background: var(--bg-card); box-shadow: var(--shadow-card); display: flex; flex-direction: column; cursor: pointer; will-change: transform; transition: transform 0.25s cubic-bezier(.2,.8,.2,1), border-color 0.3s, box-shadow 0.3s; }
    .article-card:hover { transform: translateY(-4px); border-color: var(--line-strong); box-shadow: var(--shadow-card), var(--glow); }
    .article-card:active { transform: scale(1.03); transition-duration: 0.1s; }
    [data-theme="gray"] .article-card, [data-theme="black"] .article-card { border-color: var(--line); }
    [data-theme="gray"] .article-card:hover, [data-theme="black"] .article-card:hover { border-color: var(--line-strong); }
    .tag { width: fit-content; padding: 4px 10px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 12px; margin-bottom: 12px; }
    .article-card h3 { font-size: 18px; line-height: 1.4; margin-bottom: 8px; }
    .meta { color: var(--muted-2); font-size: 13px; margin-bottom: 10px; }
    .excerpt { color: var(--muted); font-size: 14px; line-height: 1.75; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .read { margin-top: 14px; color: var(--accent); font-size: 13px; font-weight: 800; }
    .empty { display: none; padding: 28px; border: 1px dashed var(--line-strong); border-radius: 22px; text-align: center; color: var(--muted); background: var(--bg-card); }
    .empty.show { display: block; }

    .article-tag { display: inline-flex; padding: 5px 12px; border-radius: 999px; background: var(--accent-soft); color: var(--accent); font-size: 13px; margin-bottom: 16px; }
    .article-page h1 { font-size: clamp(30px, 5vw, 46px); line-height: 1.25; letter-spacing: -0.04em; margin-bottom: 14px; }
    .article-meta { color: var(--muted); font-size: 14px; padding-bottom: 22px; margin-bottom: 28px; border-bottom: 1px solid var(--line); }
    .article-content { color: var(--text); font-size: 16.5px; line-height: 2; }
    .article-content p { margin-bottom: 18px; }
    .article-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--line); }
    .nav-btn { padding: 16px 18px; border-radius: 18px; border: 1px solid var(--line); background: var(--bg-card); display: flex; flex-direction: column; gap: 5px; transition: transform 0.2s, box-shadow 0.2s; }
    .nav-btn:active { transform: scale(1.03); transition-duration: 0.1s; }
    .nav-btn:hover { box-shadow: var(--glow); } .nav-btn.disabled { opacity: 0.42; pointer-events: none; } .nav-btn.next { text-align: right; align-items: flex-end; }
    .nav-label { color: var(--muted); font-size: 12px; } .nav-title { color: var(--accent); font-weight: 800; font-size: 14px; }

    .back-top { position: fixed; right: 22px; bottom: 22px; z-index: 70; width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line); background: var(--bg-card); color: var(--text); display: grid; place-items: center; opacity: 0; pointer-events: none; transform: translateY(16px); backdrop-filter: blur(12px); transition: opacity 0.25s, transform 0.25s; }
    .back-top.show { opacity: 1; pointer-events: auto; transform: translateY(0); } .back-top:hover { box-shadow: var(--glow); }
    footer { position: relative; z-index: 2; padding: 28px 0 46px; text-align: center; color: var(--muted); font-size: 14px; border-top: 1px solid var(--line); }

    @media (max-width: 980px) { .grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 680px) { .topbar { flex-wrap: wrap; border-radius: 26px; } .nav-actions { width: 100%; justify-content: space-between; } .grid { grid-template-columns: 1fr; } .card, .panel { padding: 22px; } .article-nav { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="flow-bg" aria-hidden="true"><div class="blob b1"></div><div class="blob b2"></div></div>
  <div class="topbar-wrap"><div class="topbar">
    <a href="index.html" class="brand">银杏新评</a>
    <div class="nav-actions">
      <a href="index.html" class="back-btn">← 返回主页</a>
      <div class="theme-switcher" id="themeSwitcher">
        <button class="theme-btn" data-theme="light"></button>
        <button class="theme-btn" data-theme="gray"></button>
        <button class="theme-btn" data-theme="black"></button>
        <button class="theme-btn" data-theme="blue"></button>
      </div>
    </div>
  </div></div>

  <main class="page"><div id="content"></div></main>
  <footer>© <span id="year"></span> 银杏新评 · 非营利学生投稿文学评论集</footer>
  <button class="back-top" id="backTop" aria-label="返回顶部">↑</button>

  <script>
    const $ = id => document.getElementById(id);
    const escapeHtml = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    const formatContent = text => String(text ?? "").split(/\n\s*\n/).map(p => `<p>${escapeHtml(p).replace(/\n/g,"<br>")}</p>`).join("");

    function setTheme(t) { document.documentElement.dataset.theme = t; localStorage.setItem("yx-theme", t); document.querySelectorAll(".theme-btn").forEach(b => b.classList.toggle("active", b.dataset.theme === t)); }
    setTheme(localStorage.getItem("yx-theme") || "light");
    $("themeSwitcher").onclick = e => { const b = e.target.closest(".theme-btn"); if(b) setTheme(b.dataset.theme); };
    $("year").textContent = new Date().getFullYear();

    let allArticles = [];
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const cat = params.get("cat");

    async function loadArticles() {
      try { const r = await fetch("articles.json?_=" + Date.now()); allArticles = await r.json(); allArticles.sort((a,b) => new Date(b.date) - new Date(a.date)); } catch(e) { allArticles = []; }
      if (id) renderArticle(id); else renderLibrary();
    }

    function makeCard(article) {
      const c = document.createElement("article"); c.className = "article-card";
      c.onclick = () => location.href = "article.html?id=" + encodeURIComponent(article.id);
      c.innerHTML = `<span class="tag">${escapeHtml(article.category)}</span><h3>${escapeHtml(article.title)}</h3><div class="meta">${escapeHtml(article.author)} · ${escapeHtml(article.date)}</div><div class="excerpt">${escapeHtml(article.excerpt || "")}</div><div class="read">阅读全文 →</div>`;
      return c;
    }

    function renderLibrary() {
      const title = cat || "全部文章";
      const list = cat ? allArticles.filter(a => a.category === cat) : allArticles;
      $("content").innerHTML = `
        <section class="panel">
          <div class="panel-head"><div><h1>${escapeHtml(title)}</h1><p>完整文章库 · 下方搜索</p></div></div>
          <div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><input id="libSearch" type="search" placeholder="搜索..." /></div>
          <div class="chips">
            <a class="chip ${!cat?'active':''}" href="article.html">全部</a>
            <a class="chip ${cat==='时事评论'?'active':''}" href="article.html?cat=时事评论">时事评论</a>
            <a class="chip ${cat==='学术交流'?'active':''}" href="article.html?cat=学术交流">学术交流</a>
            <a class="chip ${cat==='随笔记录'?'active':''}" href="article.html?cat=随笔记录">随笔记录</a>
            <a class="chip ${cat==='文学创作'?'active':''}" href="article.html?cat=文学创作">文学创作</a>
          </div>
          <div class="grid" id="articleGrid"></div>
          <div class="empty" id="libEmpty">没有找到匹配文章</div>
        </section>`;
      
      const input = $("libSearch"), grid = $("articleGrid"), empty = $("libEmpty");
      function draw() {
        const kw = input.value.trim().toLowerCase();
        grid.innerHTML = "";
        const res = list.filter(a => `${a.title} ${a.author} ${a.excerpt} ${a.content}`.toLowerCase().includes(kw));
        if(!res.length) { empty.classList.add("show"); return; }
        empty.classList.remove("show");
        res.forEach(a => grid.appendChild(makeCard(a)));
      }
      input.oninput = draw;
      draw();
    }

    function renderArticle(articleId) {
      const idx = allArticles.findIndex(a => a.id === articleId);
      if (idx === -1) { $("content").innerHTML = `<div class="panel" style="text-align:center"><h1 style="margin-bottom:12px">未找到这篇文章</h1><p style="color:var(--muted)">可能文章已删除或链接有误</p><br><a href="article.html" style="color:var(--accent);font-weight:700">返回全部文章</a></div>`; return; }
      const a = allArticles[idx], prev = idx > 0 ? allArticles[idx-1] : null, next = idx < allArticles.length-1 ? allArticles[idx+1] : null;
      document.title = a.title + " · 银杏新评";
      $("content").innerHTML = `
        <article class="article-page card">
          <span class="article-tag">${escapeHtml(a.category)}</span>
          <h1>${escapeHtml(a.title)}</h1>
          <div class="article-meta">${escapeHtml(a.author)} · ${escapeHtml(a.date)}</div>
          <div class="article-content">${formatContent(a.content)}</div>
          <div class="article-nav">
            <a class="nav-btn ${prev?'':'disabled'}" href="${prev ? 'article.html?id='+encodeURIComponent(prev.id) : '#'}"><span class="nav-label">← 上一篇</span><span class="nav-title">${prev ? escapeHtml(prev.title) : '已是第一篇'}</span></a>
            <a class="nav-btn next ${next?'':'disabled'}" href="${next ? 'article.html?id='+encodeURIComponent(next.id) : '#'}"><span class="nav-label">下一篇 →</span><span class="nav-title">${next ? escapeHtml(next.title) : '已是最后一篇'}</span></a>
          </div>
        </article>`;
    }

    const backTop = $("backTop");
    window.addEventListener("scroll", () => backTop.classList.toggle("show", scrollY > 420), {passive:true});
    backTop.onclick = () => scrollTo({top:0, behavior:"smooth"});

    loadArticles();
  </script>
</body>
</html>
