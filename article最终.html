<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 · 银杏新评</title>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    html { scroll-behavior: smooth; }

    * { -webkit-tap-highlight-color: transparent; }
    ::selection { background: var(--accent-soft); color: inherit; }
    ::-moz-selection { background: var(--accent-soft); color: inherit; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

    *:focus { outline: none; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    :root[data-theme="light"] {
      --bg: #fffaf0;
      --bg-card: rgba(255, 255, 255, 0.78);
      --text: #2d2515;
      --muted: #776a45;
      --muted-2: rgba(118, 103, 70, 0.65);
      --accent: #9a6d00;
      --accent-bright: #d8a51f;
      --accent-soft: rgba(217, 165, 32, 0.32);
      --line: rgba(110, 80, 20, 0.18);
      --line-strong: rgba(110, 80, 20, 0.30);
      --shadow: 0 24px 70px rgba(109, 77, 8, 0.16);
      --shadow-card: 0 18px 46px rgba(109, 77, 8, 0.10);
      --glow: 0 0 0 rgba(217, 165, 32, 0);
      --blob-1: rgba(255, 217, 93, 0.30);
      --blob-2: rgba(112, 145, 64, 0.18);
      --leaf-color: linear-gradient(135deg, #f0c33a, #a97600);
    }
    :root[data-theme="gray"] {
      --bg: #2e2e2e;
      --bg-card: rgba(48, 48, 48, 0.85);
      --text: #ebe8df;
      --muted: #b0aa9c;
      --muted-2: rgba(176, 170, 156, 0.6);
      --accent: #f0c33a;
      --accent-bright: #ffd966;
      --accent-soft: rgba(240, 195, 58, 0.30);
      --line: rgba(240, 195, 58, 0.32);
      --line-strong: rgba(240, 195, 58, 0.55);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
      --shadow-card: 0 18px 46px rgba(0, 0, 0, 0.4), 0 0 28px rgba(240, 195, 58, 0.10);
      --glow: 0 0 22px rgba(240, 195, 58, 0.20);
      --blob-1: rgba(240, 195, 58, 0.08);
      --blob-2: rgba(240, 195, 58, 0.05);
      --leaf-color: linear-gradient(135deg, #f0c33a, #b88806);
    }
    :root[data-theme="black"] {
      --bg: #080808;
      --bg-card: rgba(16, 16, 16, 0.92);
      --text: #f5f3ed;
      --muted: #b8b3a3;
      --muted-2: rgba(184, 179, 163, 0.6);
      --accent: #ffd54a;
      --accent-bright: #ffeb8a;
      --accent-soft: rgba(255, 213, 74, 0.30);
      --line: rgba(255, 213, 74, 0.38);
      --line-strong: rgba(255, 213, 74, 0.65);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.7);
      --shadow-card: 0 18px 46px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 213, 74, 0.15);
      --glow: 0 0 30px rgba(255, 213, 74, 0.28);
      --blob-1: rgba(255, 213, 74, 0.06);
      --blob-2: rgba(255, 213, 74, 0.04);
      --leaf-color: linear-gradient(135deg, #ffd54a, #b88806);
    }
    :root[data-theme="blue"] {
      --bg: #eef3fb;
      --bg-card: rgba(255, 255, 255, 0.82);
      --text: #1a2a44;
      --muted: #56688a;
      --muted-2: rgba(86, 104, 138, 0.65);
      --accent: #2c5fa8;
      --accent-bright: #4a83d4;
      --accent-soft: rgba(74, 131, 212, 0.28);
      --line: rgba(44, 95, 168, 0.22);
      --line-strong: rgba(44, 95, 168, 0.42);
      --shadow: 0 24px 70px rgba(28, 64, 122, 0.14);
      --shadow-card: 0 18px 46px rgba(28, 64, 122, 0.10);
      --glow: 0 0 0 rgba(74, 131, 212, 0);
      --blob-1: rgba(74, 131, 212, 0.22);
      --blob-2: rgba(140, 180, 230, 0.18);
      --leaf-color: linear-gradient(135deg, #6ea7e8, #2c5fa8);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      transition: color 0.5s ease, background 0.5s ease;
    }

    .page {
      width: min(820px, calc(100% - 36px));
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .card, .topbar, .back-btn, .nav-btn, .theme-btn, .article-tag {
      transition: background-color 0.4s ease, color 0.4s ease,
                  border-color 0.4s ease, box-shadow 0.4s ease, transform 0.3s cubic-bezier(.2,.7,.2,1);
    }

    /* 流动背景 */
    .flow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.6;
      will-change: transform;
      animation: blobFloat 18s ease-in-out infinite;
    }
    .blob.b1 { width: 380px; height: 380px; top: -100px; left: -80px; background: var(--blob-1); }
    .blob.b2 { width: 320px; height: 320px; top: 50%; right: -60px; background: var(--blob-2); animation-duration: 26s; }
    .blob.b3 { width: 280px; height: 280px; bottom: 5%; left: 30%; background: var(--blob-1); animation-duration: 22s; }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(40px, -30px) scale(1.06); }
    }
    .leaf {
      position: absolute;
      width: 24px; height: 24px;
      border-radius: 50% 0 50% 50%;
      background: var(--leaf-color);
      transform: rotate(-45deg);
      opacity: 0.28;
      will-change: transform, top;
      animation: leafDrift 22s linear infinite;
    }
    .leaf.l1 { left: 12%; animation-duration: 26s; }
    .leaf.l2 { left: 40%; width: 18px; height: 18px; animation-duration: 30s; animation-delay: -6s; }
    .leaf.l3 { left: 70%; width: 22px; height: 22px; animation-duration: 24s; animation-delay: -12s; }
    .leaf.l4 { left: 90%; width: 16px; height: 16px; animation-duration: 28s; animation-delay: -3s; }
    @keyframes leafDrift {
      0%   { top: -8%; }
      100% { top: 110%; }
    }

    /* 悬浮胶囊导航 */
    .topbar-wrap {
      position: fixed;
      top: 18px;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: 0 18px;
      pointer-events: none;
    }
    .topbar {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 14px 10px 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--bg-card);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
      max-width: 720px;
      width: 100%;
    }
    [data-theme="gray"] .topbar,
    [data-theme="black"] .topbar {
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4), 0 0 22px var(--line);
    }
    [data-theme="blue"] .topbar {
      box-shadow: 0 14px 40px rgba(28, 64, 122, 0.18);
    }
    .brand {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.1em;
    }
    .nav-actions { display: flex; align-items: center; gap: 10px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 50%, transparent);
      color: var(--text);
      font-size: 13px;
    }
    .back-btn:hover {
      box-shadow: var(--glow);
      border-color: var(--line-strong);
      transform: translateX(-2px);
    }

    .theme-switcher {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 50%, transparent);
    }
    .theme-btn {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .theme-btn[data-theme="light"] { background: #fffaf0; }
    .theme-btn[data-theme="gray"]  { background: #3a3a3a; }
    .theme-btn[data-theme="black"] { background: #0a0a0a; }
    .theme-btn[data-theme="blue"]  { background: linear-gradient(135deg, #6ea7e8, #2c5fa8); }
    .theme-btn:hover { transform: scale(1.12); }
    .theme-btn.active {
      transform: scale(1.18);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    main { padding: 100px 0 70px; }

    .article-page {
      padding: 36px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: var(--bg-card);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      animation: pageIn .7s cubic-bezier(.2,.7,.2,1) both;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .article-tag {
      display: inline-flex;
      width: fit-content;
      padding: 5px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .article-page h1 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.25;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }
    .article-meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }
    .article-content {
      color: var(--text);
      font-size: 16.5px;
      line-height: 2;
    }
    .article-content p { margin-bottom: 18px; }
    .article-content p:last-child { margin-bottom: 0; }

    .article-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    .nav-btn {
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg-card) 70%, transparent);
      color: var(--text);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .nav-btn:hover {
      box-shadow: var(--glow);
      border-color: var(--line-strong);
      transform: translateY(-2px);
    }
    .nav-btn.disabled { opacity: 0.4; pointer-events: none; }
    .nav-btn.next { text-align: right; align-items: flex-end; }
    .nav-btn-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .nav-btn-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .not-found {
      padding: 60px 30px;
      border-radius: 26px;
      border: 1px dashed var(--line-strong);
      background: var(--bg-card);
      text-align: center;
      color: var(--muted);
    }
    .not-found h2 { font-size: 24px; color: var(--text); margin-bottom: 10px; }
    .not-found a {
      display: inline-block;
      margin-top: 18px;
      padding: 11px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    footer {
      padding: 28px 0 48px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .back-top {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--line);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      transition: opacity .3s ease, transform .3s ease, box-shadow .3s ease;
      z-index: 90;
      backdrop-filter: blur(12px);
    }
    .back-top.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .back-top:hover { box-shadow: var(--glow); border-color: var(--line-strong); }

    @media (max-width: 620px) {
      .topbar-wrap { top: 12px; }
      .topbar { padding: 8px 8px 8px 16px; }
      .article-nav { grid-template-columns: 1fr; }
      .article-page { padding: 24px; }
    }
  </style>
</head>

<body>
  <div class="flow-bg" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="leaf l1"></div>
    <div class="leaf l2"></div>
    <div class="leaf l3"></div>
    <div class="leaf l4"></div>
  </div>

  <div class="topbar-wrap">
    <div class="topbar">
      <a href="index.html" class="brand">银杏新评</a>
      <div class="nav-actions">
        <a href="index.html" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          返回主页
        </a>
        <div class="theme-switcher" id="themeSwitcher">
          <button class="theme-btn" data-theme="light" aria-label="白色主题"></button>
          <button class="theme-btn" data-theme="gray" aria-label="灰色主题"></button>
          <button class="theme-btn" data-theme="black" aria-label="黑色主题"></button>
          <button class="theme-btn" data-theme="blue" aria-label="蓝色主题"></button>
        </div>
      </div>
    </div>
  </div>

  <main class="page">
    <div id="content"></div>
  </main>

  <footer>
    © <span id="year"></span> 银杏新评 · 非营利学生投稿文学评论集
  </footer>

  <button class="back-top" id="backTop" aria-label="返回顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <line x1="12" y1="19" x2="12" y2="5"></line>
      <polyline points="5 12 12 5 19 12"></polyline>
    </svg>
  </button>

  <script>
    const $ = (id) => document.getElementById(id);
    const escapeHtml = (s) => String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function formatContent(text) {
      return String(text)
        .split(/\n\s*\n/)
        .map(para => `<p>${escapeHtml(para).replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('yx-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.theme === theme);
      });
    }
    (function initTheme() {
      const saved = localStorage.getItem('yx-theme') || 'light';
      setTheme(saved);
    })();
    document.getElementById('themeSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.theme-btn');
      if (btn) setTheme(btn.dataset.theme);
    });

    $('year').textContent = new Date().getFullYear();

    const id = new URLSearchParams(window.location.search).get('id');

    function showNotFound() {
      $('content').innerHTML = `
        <div class="not-found">
          <h2>未找到这篇文章</h2>
          <p>可能链接已失效，或文章尚未发布</p>
          <a href="index.html">返回主页</a>
        </div>
      `;
    }

    async function loadArticle() {
      if (!id) { showNotFound(); return; }
      let list = [];
      try {
        const res = await fetch('_data/articles.json');
        if (res.ok) list = await res.json();
        else throw 0;
      } catch (err) {
        try {
          const res2 = await fetch('articles.json');
          if (res2.ok) list = await res2.json();
        } catch (e) { showNotFound(); return; }
      }
      if (list.length === 0) { showNotFound(); return; }

      const sorted = [...list].sort((a, b) => new Date(b.date) - new Date(a.date));
      const index = sorted.findIndex(a => a.id === id);
      if (index === -1) { showNotFound(); return; }

      const article = sorted[index];
      const prev = index > 0 ? sorted[index - 1] : null;
      const next = index < sorted.length - 1 ? sorted[index + 1] : null;

      $('content').innerHTML = `
        <article class="article-page">
          <span class="article-tag">${escapeHtml(article.category)}</span>
          <h1>${escapeHtml(article.title)}</h1>
          <div class="article-meta">${escapeHtml(article.author)} · ${escapeHtml(article.date)}</div>
          <div class="article-content">${formatContent(article.content)}</div>
          <div class="article-nav">
            <a class="nav-btn prev ${prev ? '' : 'disabled'}" href="${prev ? `article.html?id=${encodeURIComponent(prev.id)}` : '#'}">
              <span class="nav-btn-label">← 上一篇文章</span>
              <span class="nav-btn-title">${prev ? escapeHtml(prev.title) : '已是第一篇'}</span>
            </a>
            <a class="nav-btn next ${next ? '' : 'disabled'}" href="${next ? `article.html?id=${encodeURIComponent(next.id)}` : '#'}">
              <span class="nav-btn-label">下一篇文章 →</span>
              <span class="nav-btn-title">${next ? escapeHtml(next.title) : '已是最后一篇'}</span>
            </a>
          </div>
        </article>
      `;
    }

    const backTop = $('backTop');
    window.addEventListener('scroll', () => {
      backTop.classList.toggle('show', window.scrollY > 400);
    }, { passive: true });
    backTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    /* 视差 */
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const y = window.scrollY;
          document.querySelectorAll('.blob').forEach((b, i) => {
            b.style.transform = `translate3d(0, ${y * (i + 1) * 0.04}px, 0)`;
          });
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });

    loadArticle();
  </script>
</body>
</html>
